<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Falcon Flight Styles — Pick One</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;background:#FAF8F5;color:#1A1A2E;}

/* ── BAR ── */
.bar{
  position:fixed;top:0;left:0;right:0;z-index:300;
  height:52px;display:flex;align-items:center;justify-content:space-between;
  background:rgba(250,248,245,0.96);backdrop-filter:blur(12px);
  border-bottom:1px solid #E2DDD5;padding:0 28px;
}
.bar h1{font-size:14px;font-weight:700;}
.bar-hint{font-size:12px;color:#718096;}

/* ── LARGE PREVIEW ── */
.big-preview{
  margin-top:52px;
  height:420px;
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
  background:#FAF8F5;
  transition:background 0.4s;
}
.big-preview::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 50% 50% at 50% 50%, rgba(13,148,136,0.07), transparent);
  pointer-events:none;
}
.big-wrap{
  perspective:700px;
  width:320px;height:260px;
  display:flex;align-items:center;justify-content:center;
}
.big-svg{
  width:320px;height:260px;
  transform-style:preserve-3d;
}
.big-label{
  position:absolute;bottom:22px;left:32px;
  font-size:24px;font-weight:900;color:#0D9488;letter-spacing:-0.5px;opacity:0.7;
}
.big-num{
  position:absolute;bottom:10px;right:28px;
  font-size:96px;font-weight:900;color:#0D9488;opacity:0.05;line-height:1;
}
/* dark bg toggle */
.bg-toggle{
  position:absolute;top:16px;right:20px;
  display:flex;gap:0;background:rgba(0,0,0,0.07);border-radius:8px;overflow:hidden;
}
.bg-btn{padding:6px 13px;font-size:11px;font-weight:700;background:transparent;border:none;cursor:pointer;color:rgba(0,0,0,0.35);transition:all 0.15s;letter-spacing:0.5px;}
.bg-btn.on{background:#1A1A2E;color:#FAF8F5;}

/* ── GRID ── */
.grid-wrap{padding:28px 24px 100px;}
.grid-title{font-size:10px;font-weight:800;letter-spacing:2.5px;text-transform:uppercase;color:#A0AEC0;margin-bottom:18px;}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}

.card{
  border-radius:16px;overflow:hidden;border:2px solid #E2DDD5;
  cursor:pointer;transition:all 0.2s;position:relative;
}
.card:hover{transform:translateY(-3px);border-color:#0D9488;}
.card.on{border-color:#0D9488;box-shadow:0 0 0 4px rgba(13,148,136,0.14);}

.card-stage{
  height:170px;display:flex;align-items:center;justify-content:center;
  overflow:hidden;position:relative;
  perspective:600px;
  background:#FAF8F5;
  transition:background 0.3s;
}
.card-svg{width:170px;height:138px;}

.tick{
  position:absolute;top:10px;right:10px;
  width:24px;height:24px;border-radius:50%;
  background:#0D9488;display:none;align-items:center;justify-content:center;
}
.card.on .tick{display:flex;}

.card-foot{padding:12px 15px;background:#fff;border-top:1px solid #E2DDD5;}
.card-n{font-size:20px;font-weight:900;color:#0D9488;line-height:1;}
.card-name{font-size:12px;font-weight:700;color:#1A1A2E;margin-top:2px;}
.card-desc{font-size:11px;color:#718096;margin-top:3px;line-height:1.4;}

/* ── PICK BAR ── */
.pick-bar{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(250,248,245,0.97);backdrop-filter:blur(12px);
  border-top:1px solid #E2DDD5;padding:12px 28px;
  display:flex;align-items:center;gap:14px;
}
.pick-label{font-size:13px;color:#718096;}
.pick-val{font-size:15px;font-weight:800;color:#0D9488;}

/* ══════════════════════════
   3D FLIGHT ANIMATIONS
   Applied to the SVG element
   inside a perspective container
══════════════════════════ */

/* 1 · APPROACH — dives toward viewer */
@keyframes approach{
  0%   {transform:scale(0.55) rotateX(-18deg) rotateZ(-3deg) translateY(20px);}
  48%  {transform:scale(1.18) rotateX(8deg)  rotateZ(3deg)  translateY(-12px);}
  100% {transform:scale(0.55) rotateX(-18deg) rotateZ(-3deg) translateY(20px);}
}
.fly-approach{animation:approach 4s cubic-bezier(0.4,0,0.6,1) infinite;}

/* 2 · BANK LEFT — sweeps left, wing dips */
@keyframes bankLeft{
  0%   {transform:rotateZ(-28deg) rotateY(-25deg) translateX(-36px) scale(0.9);}
  50%  {transform:rotateZ(8deg)   rotateY(10deg)  translateX(36px)  scale(1.05);}
  100% {transform:rotateZ(-28deg) rotateY(-25deg) translateX(-36px) scale(0.9);}
}
.fly-bankL{animation:bankLeft 5s ease-in-out infinite;}

/* 3 · BANK RIGHT */
@keyframes bankRight{
  0%   {transform:rotateZ(28deg)  rotateY(25deg)  translateX(36px)  scale(0.9);}
  50%  {transform:rotateZ(-8deg)  rotateY(-10deg) translateX(-36px) scale(1.05);}
  100% {transform:rotateZ(28deg)  rotateY(25deg)  translateX(36px)  scale(0.9);}
}
.fly-bankR{animation:bankRight 5s ease-in-out infinite;}

/* 4 · CLIMB — nose up, gaining height */
@keyframes climb{
  0%   {transform:rotateX(32deg)  translateY(28px)  scale(0.82) rotateZ(-4deg);}
  50%  {transform:rotateX(-12deg) translateY(-22px) scale(1.12) rotateZ(2deg);}
  100% {transform:rotateX(32deg)  translateY(28px)  scale(0.82) rotateZ(-4deg);}
}
.fly-climb{animation:climb 4.5s ease-in-out infinite;}

/* 5 · DIVE — nose down, attack */
@keyframes dive{
  0%   {transform:rotateX(-35deg) translateY(-20px) scale(0.85) rotateZ(4deg);}
  50%  {transform:rotateX(14deg)  translateY(18px)  scale(1.12) rotateZ(-2deg);}
  100% {transform:rotateX(-35deg) translateY(-20px) scale(0.85) rotateZ(4deg);}
}
.fly-dive{animation:dive 4s ease-in-out infinite;}

/* 6 · ORBIT — circles viewer, full 3D orbit */
@keyframes orbit{
  0%   {transform:rotateY(-50deg) rotateX(-8deg)  scaleX(0.7) translateX(-22px) scale(0.92);}
  25%  {transform:rotateY(0deg)   rotateX(6deg)   scaleX(1.0) translateX(0)     scale(1.08);}
  50%  {transform:rotateY(50deg)  rotateX(-8deg)  scaleX(0.7) translateX(22px)  scale(0.92);}
  75%  {transform:rotateY(0deg)   rotateX(6deg)   scaleX(1.0) translateX(0)     scale(1.08);}
  100% {transform:rotateY(-50deg) rotateX(-8deg)  scaleX(0.7) translateX(-22px) scale(0.92);}
}
.fly-orbit{animation:orbit 7s linear infinite;}

@media(max-width:768px){
  .grid{grid-template-columns:repeat(2,1fr);}
  .big-preview{height:320px;}
  .big-wrap,.big-svg{width:240px;height:194px;}
}
</style>
</head>
<body>

<div class="bar">
  <h1>Crystal Falcon — Flight Styles</h1>
  <span class="bar-hint">Click a card → see it big → tell me the number</span>
</div>

<!-- BIG PREVIEW -->
<div class="big-preview" id="bigPreview">
  <div class="bg-toggle">
    <button class="bg-btn on" onclick="setBg('light',this)">Light</button>
    <button class="bg-btn" onclick="setBg('dark',this)">Dark</button>
  </div>
  <div class="big-wrap">
    <svg class="big-svg" id="bigSvg" viewBox="0 0 200 160"></svg>
  </div>
  <div class="big-label" id="bigLabel">Select below</div>
  <div class="big-num" id="bigNum">?</div>
</div>

<!-- GRID -->
<div class="grid-wrap">
  <div class="grid-title">6 Flight Styles — Crystal Falcon #5</div>
  <div class="grid" id="mainGrid"></div>
</div>

<!-- PICK BAR -->
<div class="pick-bar">
  <span class="pick-label">Your pick:</span>
  <span class="pick-val" id="pickVal">— none yet</span>
</div>

<script>
/* ── Crystal Facets SVG builder ── */
function crystalSvg(accentC, fillA, fillB, cls) {
  return `<g class="${cls}">
    <polygon points="93,52 76,47 60,58 75,68 93,68" fill="${fillB}" stroke="${accentC}" stroke-width="1.3" stroke-linejoin="round"/>
    <polygon points="76,47 52,44 38,56 60,58"       fill="${fillA}" stroke="${accentC}" stroke-width="1.3" stroke-linejoin="round"/>
    <polygon points="52,44 27,51 9,80 15,91 38,75 38,56" fill="${fillB}" stroke="${accentC}" stroke-width="1.3" stroke-linejoin="round"/>
    <polygon points="27,51 9,80 27,74 52,44"         fill="${fillA}" stroke="${accentC}" stroke-width="1.3" stroke-linejoin="round"/>
    <polygon points="107,52 124,47 140,58 125,68 107,68" fill="${fillB}" stroke="${accentC}" stroke-width="1.3" stroke-linejoin="round"/>
    <polygon points="124,47 148,44 162,56 140,58"    fill="${fillA}" stroke="${accentC}" stroke-width="1.3" stroke-linejoin="round"/>
    <polygon points="148,44 173,51 191,80 185,91 162,75 162,56" fill="${fillB}" stroke="${accentC}" stroke-width="1.3" stroke-linejoin="round"/>
    <polygon points="173,51 191,80 173,74 148,44"    fill="${fillA}" stroke="${accentC}" stroke-width="1.3" stroke-linejoin="round"/>
    <polygon points="100,22 107,46 100,75 93,46"     fill="${fillA}" stroke="${accentC}" stroke-width="1.3" stroke-linejoin="round"/>
    <polygon points="107,46 105,92 100,75"           fill="${fillB}" stroke="${accentC}" stroke-width="1.3" stroke-linejoin="round"/>
    <polygon points="93,46 95,92 100,75"             fill="${fillB}" stroke="${accentC}" stroke-width="1.3" stroke-linejoin="round"/>
    <polygon points="100,22 104,13 100,6 96,13"      fill="${accentC}" stroke="${accentC}" stroke-width="1.3" stroke-linejoin="round"/>
    <polygon points="95,92 87,128 100,122"           fill="${fillA}" stroke="${accentC}" stroke-width="1.3" stroke-linejoin="round"/>
    <polygon points="105,92 113,128 100,122"         fill="${fillB}" stroke="${accentC}" stroke-width="1.3" stroke-linejoin="round"/>
  </g>`;
}

/* ── 6 flight options ── */
const FLIGHTS = [
  {
    n:1, name:'Dive Approach', cls:'fly-approach',
    desc:'Swoops toward the viewer — gets bigger as it flies at you',
    accentLight:'#0D9488', accentDark:'#44CAA2',
    fillALight:'rgba(13,148,136,0.09)', fillBLight:'rgba(13,148,136,0.18)',
    fillADark:'rgba(68,202,162,0.1)',   fillBDark:'rgba(68,202,162,0.2)',
  },
  {
    n:2, name:'Bank Left', cls:'fly-bankL',
    desc:'Sweeps left, right wing tips up — turning in a wide arc',
    accentLight:'#0D9488', accentDark:'#44CAA2',
    fillALight:'rgba(13,148,136,0.09)', fillBLight:'rgba(13,148,136,0.18)',
    fillADark:'rgba(68,202,162,0.1)',   fillBDark:'rgba(68,202,162,0.2)',
  },
  {
    n:3, name:'Bank Right', cls:'fly-bankR',
    desc:'Sweeps right, left wing tips up — mirror of bank left',
    accentLight:'#0D9488', accentDark:'#44CAA2',
    fillALight:'rgba(13,148,136,0.09)', fillBLight:'rgba(13,148,136,0.18)',
    fillADark:'rgba(68,202,162,0.1)',   fillBDark:'rgba(68,202,162,0.2)',
  },
  {
    n:4, name:'Climb', cls:'fly-climb',
    desc:'Nose up, gaining altitude — soaring, powerful upward flight',
    accentLight:'#0D9488', accentDark:'#44CAA2',
    fillALight:'rgba(13,148,136,0.09)', fillBLight:'rgba(13,148,136,0.18)',
    fillADark:'rgba(68,202,162,0.1)',   fillBDark:'rgba(68,202,162,0.2)',
  },
  {
    n:5, name:'Attack Dive', cls:'fly-dive',
    desc:'Nose down, wings back — diving at speed, like striking prey',
    accentLight:'#0D9488', accentDark:'#44CAA2',
    fillALight:'rgba(13,148,136,0.09)', fillBLight:'rgba(13,148,136,0.18)',
    fillADark:'rgba(68,202,162,0.1)',   fillBDark:'rgba(68,202,162,0.2)',
  },
  {
    n:6, name:'Full Orbit', cls:'fly-orbit',
    desc:'Circles in 3D — rotates through full Y axis, left to right to left',
    accentLight:'#0D9488', accentDark:'#44CAA2',
    fillALight:'rgba(13,148,136,0.09)', fillBLight:'rgba(13,148,136,0.18)',
    fillADark:'rgba(68,202,162,0.1)',   fillBDark:'rgba(68,202,162,0.2)',
  },
];

let curBg = 'light';
let curN = null;

/* Build grid */
const grid = document.getElementById('mainGrid');
FLIGHTS.forEach(f => {
  const card = document.createElement('div');
  card.className = 'card';
  card.id = 'c'+f.n;
  card.innerHTML = `
    <div class="card-stage" id="cs${f.n}" style="background:#FAF8F5;">
      <svg class="card-svg" viewBox="0 0 200 160">
        ${crystalSvg(f.accentLight, f.fillALight, f.fillBLight, f.cls)}
      </svg>
      <div class="tick">
        <svg width="12" height="12" viewBox="0 0 14 14" fill="none">
          <path d="M2.5 7L5.5 10L11.5 4" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>
    <div class="card-foot">
      <div class="card-n">${f.n}</div>
      <div class="card-name">${f.name}</div>
      <div class="card-desc">${f.desc}</div>
    </div>`;
  card.addEventListener('click', () => pick(f.n));
  grid.appendChild(card);
});

function pick(n) {
  curN = n;
  document.querySelectorAll('.card').forEach(c => c.classList.remove('on'));
  document.getElementById('c'+n).classList.add('on');
  document.getElementById('pickVal').textContent = `${n} · ${FLIGHTS[n-1].name}`;
  updateBig();
}

function setBg(mode, btn) {
  curBg = mode;
  document.querySelectorAll('.bg-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  const isDark = mode === 'dark';
  const prevBg = isDark ? '#05080F' : '#FAF8F5';
  document.getElementById('bigPreview').style.background = prevBg;
  // also update card backgrounds for preview consistency
  updateBig();
}

function updateBig() {
  if (!curN) return;
  const f = FLIGHTS[curN-1];
  const isDark = curBg === 'dark';
  const accent = isDark ? f.accentDark : f.accentLight;
  const fillA  = isDark ? f.fillADark  : f.fillALight;
  const fillB  = isDark ? f.fillBDark  : f.fillBLight;
  document.getElementById('bigSvg').innerHTML = crystalSvg(accent, fillA, fillB, f.cls);
  document.getElementById('bigLabel').textContent = f.name;
  document.getElementById('bigLabel').style.color = accent;
  document.getElementById('bigNum').textContent = curN;
  document.getElementById('bigNum').style.color = accent;
}

// Start on 1
pick(1);
</script>
</body>
</html>
