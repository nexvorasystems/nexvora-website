<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 52" fill="none">
  <!-- Geometric N icon -->
  <g transform="translate(0, 4)">
    <!-- Left vertical bar -->
    <polygon points="4,0 12,0 12,36 4,36" fill="#0F2B4C"/>
    <!-- Right vertical bar -->
    <polygon points="24,0 32,0 32,36 24,36" fill="#0F2B4C"/>
    <!-- Diagonal stroke top facet -->
    <polygon points="12,0 24,36 20,36 8,0" fill="#0D9488"/>
    <!-- Small teal top-right accent -->
    <polygon points="20,0 32,0 26,10" fill="#0D9488" opacity="0.65"/>
    <!-- Small navy bottom-left accent -->
    <polygon points="4,36 16,36 10,26" fill="#0F2B4C" opacity="0.5"/>
  </g>

  <!-- NEXVORA text -->
  <text x="44" y="28" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif" font-size="22" font-weight="800" letter-spacing="-0.5" fill="#0F2B4C">NEXVORA</text>
  <!-- SYSTEMS text -->
  <text x="45" y="44" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif" font-size="10" font-weight="700" letter-spacing="3" fill="#0D9488">SYSTEMS</text>
</svg>
