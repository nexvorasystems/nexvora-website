<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#FAF8F5;--bg-surface:#F0EDE8;--bg-card:#FFFFFF;--text:#1A1A2E;--muted:#4A5568;--dim:#718096;--border:#E2DDD5;--teal:#0D9488;--teal-lt:rgba(13,148,136,0.1);--navy:#0F2B4C;--red:#EF4444;--nav-h:76px;}
html,body{font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100%;overflow:hidden;}
nav{position:fixed;top:0;left:0;right:0;z-index:200;height:var(--nav-h);display:flex;align-items:center;background:rgba(250,248,245,0.96);-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 28px;gap:20px;}
.prog-wrap{flex:1;display:flex;align-items:center;gap:12px;max-width:400px;margin:0 auto;}
.prog-label{font-size:11px;color:var(--dim);white-space:nowrap;min-width:100px;}
.prog-bar{flex:1;height:5px;background:var(--border);border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;background:var(--teal);border-radius:99px;transition:width .6s ease;width:0%;}
.nav-back{font-size:13px;color:var(--muted);text-decoration:none;display:flex;align-items:center;gap:5px;white-space:nowrap;transition:color .15s;}
.nav-back:hover{color:var(--teal);}
.chat-wrap{position:fixed;top:var(--nav-h);left:0;right:0;bottom:0;display:flex;flex-direction:column;}
.chat-scroll{flex:1;overflow-y:auto;padding:32px 16px 20px;scroll-behavior:smooth;}
.chat-inner{max-width:640px;margin:0 auto;display:flex;flex-direction:column;gap:16px;}
.brow{display:flex;align-items:flex-end;gap:10px;}
.brow.bot{justify-content:flex-start;}
.brow.user{justify-content:flex-end;}
.avatar{width:34px;height:34px;min-width:34px;border-radius:50%;background:linear-gradient(135deg,#0F2B4C,#0D9488);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;}
.bbl{max-width:84%;padding:13px 17px;border-radius:18px;font-size:15px;line-height:1.65;}
.bbl.bot{background:var(--bg-card);border:1px solid var(--border);border-bottom-left-radius:4px;color:var(--text);}
.bbl.user{background:var(--teal);color:#fff;border-bottom-right-radius:4px;}
.typing-dots{display:flex;gap:5px;align-items:center;padding:4px 2px;}
.typing-dots span{width:7px;height:7px;border-radius:50%;background:var(--dim);animation:td 1.4s ease-in-out infinite;}
.typing-dots span:nth-child(2){animation-delay:.2s;}
.typing-dots span:nth-child(3){animation-delay:.4s;}
@keyframes td{0%,60%,100%{transform:translateY(0);opacity:.35;}30%{transform:translateY(-7px);opacity:1;}}
.chat-input-area{border-top:1px solid var(--border);background:var(--bg-card);padding:16px;flex-shrink:0;}
.input-inner{max-width:640px;margin:0 auto;display:flex;flex-direction:column;gap:10px;}
.input-row{display:flex;gap:10px;align-items:flex-end;}
.chat-input{flex:1;padding:13px 16px;border:1.5px solid var(--border);border-radius:12px;font-size:16px;color:var(--text);background:var(--bg);font-family:inherit;outline:none;transition:border-color .15s;-webkit-appearance:none;}
.chat-input:focus{border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-lt);}
.chat-input.err{border-color:var(--red);}
.send-btn{width:44px;height:44px;min-width:44px;border-radius:11px;background:var(--teal);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .18s;}
.send-btn:hover{filter:brightness(1.1);}
.send-btn:disabled{opacity:.35;cursor:not-allowed;}
.err-msg{font-size:12px;color:var(--red);display:none;}
.err-msg.show{display:block;}
.chips{display:flex;flex-wrap:wrap;gap:9px;padding-top:4px;}
.chip{padding:10px 18px;border-radius:99px;border:1.5px solid var(--border);background:var(--bg-card);font-size:14px;color:var(--muted);font-weight:500;cursor:pointer;transition:all .15s;user-select:none;min-height:44px;display:inline-flex;align-items:center;touch-action:manipulation;}
.chip.on{border-color:var(--teal);background:var(--teal);color:#fff;}
@media(hover:hover){.chip:hover{border-color:var(--teal);color:var(--teal);background:var(--teal-lt);}}
.multi-confirm{margin-top:8px;}
.multi-confirm button{padding:10px 22px;background:var(--teal);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;transition:all .18s;}
.multi-confirm button:disabled{opacity:.35;cursor:not-allowed;}
.state-search-wrap{display:flex;flex-direction:column;gap:0;}
.state-search-input{padding:12px 14px;border:1.5px solid var(--border);border-radius:10px 10px 0 0;font-size:16px;background:var(--bg);color:var(--text);font-family:inherit;outline:none;transition:border-color .15s;-webkit-appearance:none;}
.state-search-input:focus{border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-lt);}
.state-list{max-height:210px;overflow-y:auto;border:1.5px solid var(--border);border-top:none;border-radius:0 0 10px 10px;background:var(--bg-card);}
.state-list-item{display:flex;align-items:center;gap:12px;padding:11px 14px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .12s;touch-action:manipulation;}
.state-list-item:last-child{border-bottom:none;}
@media(hover:hover){.state-list-item:hover{background:var(--teal-lt);}}
.state-abbr{font-size:12px;font-weight:800;color:var(--teal);min-width:26px;}
.state-name{font-size:14px;color:var(--text);}
.num-wrap{display:flex;align-items:center;gap:12px;}
.num-input{width:120px;padding:12px 16px;border:1.5px solid var(--border);border-radius:12px;font-size:18px;font-weight:700;color:var(--text);background:var(--bg);font-family:inherit;outline:none;text-align:center;-webkit-appearance:none;-moz-appearance:textfield;}
.num-input:focus{border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-lt);}
.num-unit{font-size:14px;color:var(--muted);}
@media(max-width:600px){nav{padding:0 16px;}.prog-label{display:none;}.bbl{font-size:14px;max-width:90%;}.chat-input-area{padding:12px 14px;}}
</style>

<body>
<h1 style="position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;">Free Business Health Assessment — Nexvora Systems</h1>
<nav>
  <a href="index.html"><img src="assets/Logo no background.png" alt="Nexvora Systems" style="height:44px;width:auto;display:block;"/></a>
  <div class="prog-wrap">
    <span class="prog-label" id="progLabel">Getting started</span>
    <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
  </div>
  <a href="index.html" class="nav-back">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    Back
  </a>
</nav>
<div class="chat-wrap">
  <div class="chat-scroll" id="chatScroll">
    <div class="chat-inner" id="chatInner"></div>
  </div>
  <div class="chat-input-area" id="inputArea" style="display:none;">
    <div class="input-inner" id="inputInner"></div>
  </div>
</div>
<script>
/* ── GLOBALS ─────────────────────────────────────────── */
const A = {}; // all answers
const TOTAL_STEPS = 23; // 4 contact + 19 questions
let currentStep = 0;
const sleep = ms => new Promise(r => setTimeout(r, ms));

/* ── PROGRESS ────────────────────────────────────────── */
function setProgress(step, label) {
  currentStep = step;
  const pct = Math.min((step / TOTAL_STEPS) * 100, 99);
  document.getElementById('progFill').style.width = pct + '%';
  if (label) document.getElementById('progLabel').textContent = label;
}

/* ── SCROLL ──────────────────────────────────────────── */
function scrollBottom() {
  const el = document.getElementById('chatScroll');
  el.scrollTop = el.scrollHeight;
}
function scrollToLast() {
  const el = document.getElementById('chatScroll');
  const bots = el.querySelectorAll('.brow.bot');
  if (bots.length) el.scrollTo({ top: Math.max(0, bots[bots.length-1].offsetTop - 28), behavior: 'smooth' });
}

/* ── BUBBLE ──────────────────────────────────────────── */
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function addBubble(text, type, isHtml=false) {
  const inner = document.getElementById('chatInner');
  const row = document.createElement('div');
  row.className = `brow ${type}`;
  const content = isHtml ? text : esc(text);
  if (type === 'bot') row.innerHTML = `<div class="avatar">NX</div><div class="bbl bot">${content}</div>`;
  else row.innerHTML = `<div class="bbl user">${content}</div>`;
  inner.appendChild(row);
  scrollBottom();
  return row;
}

/* ── TYPING ──────────────────────────────────────────── */
let typingEl = null;
function showTyping() {
  if (typingEl) return;
  const inner = document.getElementById('chatInner');
  typingEl = document.createElement('div');
  typingEl.className = 'brow bot';
  typingEl.innerHTML = `<div class="avatar">NX</div><div class="bbl bot"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  inner.appendChild(typingEl);
  scrollBottom();
}
function hideTyping() { if (typingEl) { typingEl.remove(); typingEl = null; } }

async function speak(text, delay=800, isHtml=false) {
  showTyping();
  await sleep(delay);
  hideTyping();
  addBubble(text, 'bot', isHtml);
}

/* ── INPUT CLEAR ─────────────────────────────────────── */
function clearInput() {
  document.getElementById('inputInner').innerHTML = '';
  document.getElementById('inputArea').style.display = 'none';
}

/* ── TEXT INPUT ──────────────────────────────────────── */
function askText(placeholder, validate, type='text') {
  return new Promise(resolve => {
    const area = document.getElementById('inputArea');
    const inner = document.getElementById('inputInner');
    inner.innerHTML = `
      <div class="input-row">
        <input class="chat-input" id="ci" type="${type}" placeholder="${placeholder}" autocomplete="off"/>
        <button class="send-btn" id="csend" disabled>
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
      <div class="err-msg" id="cerr"></div>`;
    area.style.display = '';
    const inp = document.getElementById('ci');
    const btn = document.getElementById('csend');
    const err = document.getElementById('cerr');
    inp.addEventListener('input', () => { btn.disabled = !inp.value.trim(); inp.classList.remove('err'); err.classList.remove('show'); });
    const submit = () => {
      const val = inp.value.trim();
      if (!val) return;
      if (validate) { const e = validate(val); if (e) { inp.classList.add('err'); err.textContent = e; err.classList.add('show'); return; } }
      clearInput(); resolve(val);
    };
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
    btn.addEventListener('click', submit);
    setTimeout(() => { inp.focus(); scrollToLast(); }, 80);
  });
}

/* ── NUMBER INPUT ────────────────────────────────────── */
function askNumber(unit, min, max) {
  return new Promise(resolve => {
    const area = document.getElementById('inputArea');
    const inner = document.getElementById('inputInner');
    inner.innerHTML = `
      <div class="input-row">
        <div class="num-wrap">
          <input class="num-input" id="ni" type="number" min="${min}" max="${max}" placeholder="0"/>
          <span class="num-unit">${unit}</span>
        </div>
        <button class="send-btn" id="nsend" disabled>
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
      <div class="err-msg" id="nerr"></div>`;
    area.style.display = '';
    const inp = document.getElementById('ni');
    const btn = document.getElementById('nsend');
    const err = document.getElementById('nerr');
    inp.addEventListener('input', () => { btn.disabled = inp.value === '' || isNaN(Number(inp.value)); inp.classList.remove('err'); err.classList.remove('show'); });
    const submit = () => {
      const val = Number(inp.value);
      if (isNaN(val)) return;
      if (val < min || val > max) { inp.classList.add('err'); err.textContent = `Please enter a value between ${min} and ${max}`; err.classList.add('show'); return; }
      clearInput(); resolve(val);
    };
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
    btn.addEventListener('click', submit);
    setTimeout(() => { inp.focus(); scrollToLast(); }, 80);
  });
}

/* ── SINGLE CHIP ─────────────────────────────────────── */
function askChips(options) {
  return new Promise(resolve => {
    const area = document.getElementById('inputArea');
    const inner = document.getElementById('inputInner');
    const wrap = document.createElement('div');
    wrap.className = 'chips';
    options.forEach(o => {
      const chip = document.createElement('div');
      chip.className = 'chip';
      chip.textContent = o.label;
      chip.onclick = () => { clearInput(); resolve(o.value); };
      wrap.appendChild(chip);
    });
    inner.innerHTML = '';
    inner.appendChild(wrap);
    area.style.display = '';
    setTimeout(() => scrollToLast(), 80);
  });
}

/* ── MULTI CHIP ──────────────────────────────────────── */
function askMultiChips(options, minSelect=1, exclusiveValues=[]) {
  return new Promise(resolve => {
    const area = document.getElementById('inputArea');
    const inner = document.getElementById('inputInner');
    const wrap = document.createElement('div');
    wrap.className = 'chips';
    const selected = new Set();
    const chipEls = {};
    options.forEach(o => {
      const chip = document.createElement('div');
      chip.className = 'chip';
      chip.textContent = o.label;
      chipEls[o.value] = chip;
      chip.onclick = () => {
        if (selected.has(o.value)) {
          selected.delete(o.value); chip.classList.remove('on');
        } else {
          // If clicking an exclusive value, deselect everything else
          if (exclusiveValues.includes(o.value)) {
            selected.forEach(v => { selected.delete(v); if(chipEls[v]) chipEls[v].classList.remove('on'); });
          } else {
            // If clicking a regular value, deselect any exclusive values
            exclusiveValues.forEach(ev => { if(selected.has(ev)) { selected.delete(ev); if(chipEls[ev]) chipEls[ev].classList.remove('on'); } });
          }
          selected.add(o.value); chip.classList.add('on');
        }
        confirmBtn.disabled = selected.size < minSelect;
      };
      wrap.appendChild(chip);
    });
    const confirmDiv = document.createElement('div');
    confirmDiv.className = 'multi-confirm';
    const confirmBtn = document.createElement('button');
    confirmBtn.textContent = 'Confirm →';
    confirmBtn.disabled = true;
    confirmBtn.onclick = () => { clearInput(); resolve([...selected]); };
    confirmDiv.appendChild(confirmBtn);
    inner.innerHTML = '';
    inner.appendChild(wrap);
    inner.appendChild(confirmDiv);
    area.style.display = '';
    setTimeout(() => scrollToLast(), 80);
  });
}

/* ── STATE SEARCH PICKER ─────────────────────────────── */
const ALL_STATES = [
  {abbr:'AL',name:'Alabama'},{abbr:'AK',name:'Alaska'},{abbr:'AZ',name:'Arizona'},{abbr:'AR',name:'Arkansas'},{abbr:'CA',name:'California'},{abbr:'CO',name:'Colorado'},{abbr:'CT',name:'Connecticut'},{abbr:'DE',name:'Delaware'},{abbr:'FL',name:'Florida'},{abbr:'GA',name:'Georgia'},{abbr:'HI',name:'Hawaii'},{abbr:'ID',name:'Idaho'},{abbr:'IL',name:'Illinois'},{abbr:'IN',name:'Indiana'},{abbr:'IA',name:'Iowa'},{abbr:'KS',name:'Kansas'},{abbr:'KY',name:'Kentucky'},{abbr:'LA',name:'Louisiana'},{abbr:'ME',name:'Maine'},{abbr:'MD',name:'Maryland'},{abbr:'MA',name:'Massachusetts'},{abbr:'MI',name:'Michigan'},{abbr:'MN',name:'Minnesota'},{abbr:'MS',name:'Mississippi'},{abbr:'MO',name:'Missouri'},{abbr:'MT',name:'Montana'},{abbr:'NE',name:'Nebraska'},{abbr:'NV',name:'Nevada'},{abbr:'NH',name:'New Hampshire'},{abbr:'NJ',name:'New Jersey'},{abbr:'NM',name:'New Mexico'},{abbr:'NY',name:'New York'},{abbr:'NC',name:'North Carolina'},{abbr:'ND',name:'North Dakota'},{abbr:'OH',name:'Ohio'},{abbr:'OK',name:'Oklahoma'},{abbr:'OR',name:'Oregon'},{abbr:'PA',name:'Pennsylvania'},{abbr:'RI',name:'Rhode Island'},{abbr:'SC',name:'South Carolina'},{abbr:'SD',name:'South Dakota'},{abbr:'TN',name:'Tennessee'},{abbr:'TX',name:'Texas'},{abbr:'UT',name:'Utah'},{abbr:'VT',name:'Vermont'},{abbr:'VA',name:'Virginia'},{abbr:'WA',name:'Washington'},{abbr:'WV',name:'West Virginia'},{abbr:'WI',name:'Wisconsin'},{abbr:'WY',name:'Wyoming'}
];

function askState() {
  return new Promise(resolve => {
    const area = document.getElementById('inputArea');
    const inner = document.getElementById('inputInner');
    inner.innerHTML = `
      <div class="state-search-wrap">
        <input class="state-search-input" id="stateSearch" type="text" placeholder="Search state..." autocomplete="off"/>
        <div class="state-list" id="stateList"></div>
      </div>`;
    area.style.display = '';

    const searchEl = document.getElementById('stateSearch');
    const listEl = document.getElementById('stateList');

    function renderList(filter) {
      const q = (filter||'').toLowerCase().trim();
      const filtered = q
        ? ALL_STATES.filter(s => s.name.toLowerCase().includes(q) || s.abbr.toLowerCase().startsWith(q))
        : ALL_STATES;
      listEl.innerHTML = '';
      filtered.forEach(s => {
        const item = document.createElement('div');
        item.className = 'state-list-item';
        item.innerHTML = `<span class="state-abbr">${s.abbr}</span><span class="state-name">${s.name}</span>`;
        item.onclick = () => { clearInput(); resolve(s.abbr); };
        listEl.appendChild(item);
      });
    }

    renderList();
    searchEl.addEventListener('input', () => renderList(searchEl.value));
    setTimeout(() => { searchEl.focus(); scrollToLast(); }, 80);
  });
}

/* ── MAIN FLOW ───────────────────────────────────────── */
async function main() {
  setProgress(0, 'Getting started');
  await sleep(400);
  await speak("Hi, I'm Nex — your Nexvora advisor. I'll ask you a few questions about your business and put together a personalized report. It takes about 5 minutes.", 900);
  await sleep(200);
  await speak("Let's start with some contact info so we can send you the report.", 700);

  /* ── CONTACT INFO ── */
  await sleep(300);
  await speak("What's your full name?", 600);
  setProgress(1, 'Contact info');
  const name = await askText("Your full name", v => v.trim().length >= 2 ? null : "Please enter your full name");
  addBubble(name, 'user');
  A.contact = { name };
  const first = name.split(' ')[0];

  setProgress(2);
  await speak(`Great to meet you, ${first}! What email should we send your report to?`, 700);
  const email = await askText("your@email.com", v => /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(v) ? null : "Please enter a valid email", 'email');
  addBubble(email, 'user');
  A.contact.email = email;

  setProgress(3);
  await speak("Your phone number?", 600);
  const phone = await askText("+1 (555) 000-0000", v => v.replace(/\D/g,'').length >= 7 ? null : "Please enter a valid phone number", 'tel');
  addBubble(phone, 'user');
  A.contact.phone = phone;

  setProgress(4);
  await speak("And your company name? (optional — type 'skip' if you prefer)", 600);
  const company = await askText("Company name or 'skip'", null);
  addBubble(company.toLowerCase() === 'skip' ? '(skipped)' : company, 'user');
  A.contact.company = company.toLowerCase() === 'skip' ? '' : company;

  /* ── PROFILE QUESTIONS ── */
  setProgress(5, 'About your business');
  await speak(`Thanks, ${first}. Now a few questions about your business.`, 800);
  await sleep(200);

  await speak("Which industry is your business in?", 600);
  A.q1 = await askChips([
    {label:'Home Services',value:'home-services'},
    {label:'Construction & Contractors',value:'construction'},
    {label:'Food & Beverage',value:'food-bev'},
    {label:'Retail',value:'retail'},
    {label:'Health & Wellness',value:'health-wellness'},
    {label:'Professional Services',value:'professional-services'},
    {label:'Auto Services',value:'auto'},
    {label:'Real Estate',value:'real-estate'},
  ]);
  addBubble({
    'home-services':'Home Services','construction':'Construction & Contractors','food-bev':'Food & Beverage',
    'retail':'Retail','health-wellness':'Health & Wellness','professional-services':'Professional Services',
    'auto':'Auto Services','real-estate':'Real Estate'
  }[A.q1], 'user');

  // Sub-type question
  const SUB_TYPES = {
    'home-services': [
      {label:'Cleaning',value:'cleaning'},{label:'Landscaping',value:'landscaping'},
      {label:'Plumbing',value:'plumbing'},{label:'HVAC',value:'hvac'},
      {label:'Roofing',value:'roofing'},{label:'Pest Control',value:'pest-control'},
      {label:'Pool Service',value:'pool'},{label:'Painting',value:'painting'},
      {label:'Electrical',value:'electrical'},{label:'Other',value:'other'},
    ],
    'construction': [
      {label:'General Contractor',value:'general'},{label:'Remodeling',value:'remodeling'},
      {label:'Concrete',value:'concrete'},{label:'Flooring',value:'flooring'},
      {label:'Fencing',value:'fencing'},{label:'Other',value:'other'},
    ],
    'food-bev': [
      {label:'Restaurant',value:'restaurant'},{label:'Café / Coffee',value:'cafe'},
      {label:'Catering',value:'catering'},{label:'Food Truck',value:'food-truck'},
      {label:'Bar',value:'bar'},{label:'Other',value:'other'},
    ],
    'retail': [
      {label:'Clothing',value:'clothing'},{label:'Furniture',value:'furniture'},
      {label:'Electronics',value:'electronics'},{label:'Specialty Store',value:'specialty'},
      {label:'Online Retail',value:'online'},{label:'Other',value:'other'},
    ],
    'health-wellness': [
      {label:'Medical Office',value:'medical'},{label:'Dental',value:'dental'},
      {label:'Chiropractic',value:'chiro'},{label:'Gym / Fitness',value:'gym'},
      {label:'Spa / Massage',value:'spa'},{label:'Mental Health',value:'mental'},
      {label:'Other',value:'other'},
    ],
    'professional-services': [
      {label:'Law Firm',value:'law'},{label:'Accounting / CPA',value:'accounting'},
      {label:'Marketing Agency',value:'agency'},{label:'Consulting',value:'consulting'},
      {label:'IT Services',value:'it'},{label:'Insurance',value:'insurance'},
      {label:'Other',value:'other'},
    ],
    'auto': [
      {label:'Auto Repair',value:'repair'},{label:'Detailing',value:'detailing'},
      {label:'Towing',value:'towing'},{label:'Dealership',value:'dealership'},
      {label:'Other',value:'other'},
    ],
    'real-estate': [
      {label:'Property Management',value:'property-mgmt'},{label:'Real Estate Agent',value:'agent'},
      {label:'Investor / Flipping',value:'investor'},{label:'Short-Term Rentals',value:'str'},
      {label:'Other',value:'other'},
    ],
  };
  await speak("What type of business specifically? (e.g. Plumbing, HVAC, Landscaping, Auto Repair…)", 500);
  A.q1b_label = await askText("Describe your business type", v => v.trim().length >= 2 ? null : "Please describe your business type (at least 2 characters)");
  addBubble(A.q1b_label, 'user');
  A.q1b = A.q1b_label.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');

  setProgress(6);
  await speak("What state is your business based in?", 600);
  A.q2 = await askState();
  addBubble((ALL_STATES.find(s=>s.abbr===A.q2)||{name:A.q2}).name, 'user');

  setProgress(7);
  await speak("How long has your business been operating?", 600);
  A.q3 = await askChips([
    {label:'Less than 1 year',value:'lt1'},
    {label:'1–2 years',value:'1-2'},
    {label:'3–5 years',value:'3-5'},
    {label:'6–10 years',value:'6-10'},
    {label:'10+ years',value:'10plus'},
  ]);
  addBubble({'lt1':'Less than 1 year','1-2':'1–2 years','3-5':'3–5 years','6-10':'6–10 years','10plus':'10+ years'}[A.q3], 'user');

  setProgress(8);
  await speak("What is your approximate annual revenue?", 600);
  A.q4 = await askChips([
    {label:'Under $100K',value:'lt100k'},
    {label:'$100K–$300K',value:'100k-300k'},
    {label:'$300K–$750K',value:'300k-750k'},
    {label:'$750K–$2M',value:'750k-2m'},
    {label:'Over $2M',value:'gt2m'},
  ]);
  addBubble({'lt100k':'Under $100K','100k-300k':'$100K–$300K','300k-750k':'$300K–$750K','750k-2m':'$750K–$2M','gt2m':'Over $2M'}[A.q4], 'user');

  setProgress(9);
  await speak("How many people work in your business, including you?", 600);
  A.q5 = await askChips([
    {label:'Just me',value:'solo'},
    {label:'2–5 people',value:'2-5'},
    {label:'6–15 people',value:'6-15'},
    {label:'16–30 people',value:'16-30'},
    {label:'30+ people',value:'30plus'},
  ]);
  addBubble({'solo':'Just me','2-5':'2–5 people','6-15':'6–15 people','16-30':'16–30 people','30plus':'30+ people'}[A.q5], 'user');

  /* ── DIAGNOSTIC QUESTIONS ── */
  setProgress(10, 'Business health');
  await speak("Now let's look at how your business actually runs. There are no right or wrong answers — just be honest.", 900);

  await speak("Do you have documented processes for how your business runs? Select all that apply.", 700);
  A.q6 = await askMultiChips([
    {label:'Nothing documented',value:'nothing'},
    {label:'Key steps in my head',value:'head'},
    {label:'Some basic notes',value:'notes'},
    {label:'Written SOPs exist',value:'sops'},
    {label:'Full SOPs + trained team',value:'full-sops'},
  ], 1, ['nothing']);
  const q6Labels = {'nothing':'Nothing documented','head':'Key steps in my head','notes':'Some basic notes','sops':'Written SOPs exist','full-sops':'Full SOPs + trained team'};
  addBubble(A.q6.map(v=>q6Labels[v]||v).join(', '), 'user');

  setProgress(11);
  await speak("Do you have repeat customers — people who come back to use your business more than once?", 700);
  const q7HasRepeat = await askChips([
    {label:'Yes', value:'yes'},
    {label:'No', value:'no'},
  ]);
  addBubble(q7HasRepeat === 'yes' ? 'Yes' : 'No', 'user');

  if (q7HasRepeat === 'no') {
    A.q7 = 'none';
    await speak("Got it. Most one-time service businesses still have strong referral and review opportunities — we'll cover that in your report.", 700);
  } else {
    await speak("Do you know approximately what percentage of your customers come back?", 600);
    const q7KnowRate = await askChips([
      {label:"Yes, I track it", value:'yes'},
      {label:"Not sure / I don't track it", value:'no'},
    ]);
    addBubble(q7KnowRate === 'yes' ? "Yes, I track it" : "Don't track it", 'user');
    if (q7KnowRate === 'yes') {
      await speak("What percentage of your customers return for repeat business?", 600);
      A.q7 = await askNumber('%', 1, 100);
      addBubble(A.q7 + '%', 'user');
      if (A.q7 >= 40) {
        await speak(`${A.q7}% — that's strong. Only about 23% of small business owners actively track their repeat rate. The fact that you know this number puts you ahead of most.`, 900);
      } else {
        await speak(`${A.q7}% repeat rate noted. The average for most small businesses is 35–45%. Your report will show you exactly how to close that gap.`, 800);
      }
    } else {
      A.q7 = 'dont-know';
      await speak("No worries — 71% of small business owners have never measured this either. We'll show you what it's likely costing you and how to start tracking it.", 900);
    }
  }

  setProgress(12);
  await speak("What happens after someone shows interest but doesn't buy immediately?", 700);
  A.q8 = await askChips([
    {label:"Nothing — they go cold",value:'nothing'},
    {label:'I follow up manually sometimes',value:'manual'},
    {label:'I have a set follow-up process',value:'process'},
    {label:'Automated follow-up system',value:'automated'},
  ]);
  addBubble({'nothing':'Nothing — they go cold','manual':'I follow up manually sometimes','process':'I have a set follow-up process','automated':'Automated follow-up system'}[A.q8], 'user');

  setProgress(13);
  await speak("How do new customers find you? Select all that apply.", 700);
  A.q9 = await askMultiChips([
    {label:'Word of mouth',value:'word-of-mouth'},
    {label:'Google search',value:'google'},
    {label:'Social media',value:'social'},
    {label:'Paid ads',value:'paid-ads'},
    {label:'Other',value:'other'},
  ], 1);
  addBubble(A.q9.map(v=>({'word-of-mouth':'Word of mouth','google':'Google search','social':'Social media','paid-ads':'Paid ads','other':'Other'}[v]||v)).join(', '), 'user');

  // Paid ads follow-up
  A.q9_adspend = null;
  A.q9_leads = null;
  if (A.q9.includes('paid-ads')) {
    await speak("You mentioned paid ads. How much do you spend on ads per month approximately?", 700);
    A.q9_adspend = await askNumber('$/month', 0, 100000);
    addBubble('$' + Number(A.q9_adspend).toLocaleString() + '/month', 'user');

    await speak("Do you know how many leads those ads generate per month?", 600);
    const knowLeads = await askChips([
      {label:"Yes, I track it", value:'yes'},
      {label:"Not sure / I don't track it", value:'no'},
    ]);
    addBubble(knowLeads === 'yes' ? "Yes, I track it" : "Don't track it", 'user');
    if (knowLeads === 'yes') {
      await speak("Approximately how many leads per month?", 500);
      A.q9_leads = await askNumber('leads/month', 1, 10000);
      addBubble(A.q9_leads + ' leads/month', 'user');
    } else {
      await speak("That's okay — most business owners don't track this. We'll flag it in your report because knowing your cost-per-lead is one of the highest-leverage things you can measure.", 800);
    }
  }

  setProgress(14);
  await speak("What is your average online review rating?", 700);
  A.q10 = await askChips([
    {label:'No reviews yet',value:'no-reviews'},
    {label:'1–3 stars',value:'1-3'},
    {label:'3–4 stars',value:'3-4'},
    {label:'4–4.5 stars',value:'4-4.5'},
    {label:'4.5–5 stars',value:'4.5-5'},
  ]);
  addBubble({'no-reviews':'No reviews yet','1-3':'1–3 stars','3-4':'3–4 stars','4-4.5':'4–4.5 stars','4.5-5':'4.5–5 stars'}[A.q10], 'user');

  setProgress(15);
  await speak("Which tasks does your team still do manually every week? Select all that apply.", 700);
  A.q11 = await askMultiChips([
    {label:'Scheduling',value:'scheduling'},
    {label:'Invoicing',value:'invoicing'},
    {label:'Customer follow-up',value:'follow-up'},
    {label:'Reporting',value:'reporting'},
    {label:'Data entry',value:'data-entry'},
    {label:'None — mostly automated',value:'none'},
  ], 1);
  addBubble(A.q11.includes('none') ? 'Mostly automated' : A.q11.join(', '), 'user');

  // Task management + follow-up follow-up questions
  A.q11b = null;
  A.q11c = null;
  if (!A.q11.includes('none')) {
    await speak("Do you use any tool to manage tasks and track what your team is working on?", 600);
    A.q11b = await askChips([
      {label:'No — we handle it verbally',value:'verbal'},
      {label:'Text or WhatsApp group',value:'chat'},
      {label:'Spreadsheet or notes',value:'spreadsheet'},
      {label:'Project management tool (Trello, Asana, etc.)',value:'pm-tool'},
      {label:'Industry-specific software',value:'industry-software'},
    ]);
    const q11bLabels = {verbal:'Verbal only',chat:'Text/WhatsApp',spreadsheet:'Spreadsheet',
      'pm-tool':'Project management tool','industry-software':'Industry software'};
    addBubble(q11bLabels[A.q11b] || A.q11b, 'user');

    await speak("How do you track customer follow-ups — making sure no one falls through the cracks?", 600);
    A.q11c = await askChips([
      {label:"We don't — people slip through",value:'none'},
      {label:'I remember them myself',value:'memory'},
      {label:'Sticky notes or whiteboard',value:'physical'},
      {label:'Spreadsheet or calendar',value:'spreadsheet'},
      {label:'CRM or automated system',value:'crm'},
    ]);
    const q11cLabels = {none:'Nothing in place',memory:'I remember them',physical:'Physical notes',
      spreadsheet:'Spreadsheet/calendar',crm:'CRM / automated'};
    addBubble(q11cLabels[A.q11c] || A.q11c, 'user');
  }

  setProgress(16);
  await speak("How do you currently manage team performance? Select all that apply.", 700);
  A.q12 = await askMultiChips([
    {label:'No formal process',value:'none'},
    {label:'Informal check-ins',value:'informal'},
    {label:'Regular 1-on-1s',value:'one-on-ones'},
    {label:'KPIs and performance tracking',value:'kpis'},
    {label:'Written scorecards or accountability system',value:'formal'},
    {label:'Formal performance reviews (quarterly/annual)',value:'reviews'},
  ], 1);
  const q12Labels = {'none':'No formal process','informal':'Informal check-ins','one-on-ones':'Regular 1-on-1s','kpis':'KPIs and tracking','formal':'Written scorecards','reviews':'Formal reviews'};
  addBubble(A.q12.map(v => q12Labels[v] || v).join(', '), 'user');

  setProgress(17);
  await speak("How often do you review your business financials?", 700);
  A.q13 = await askChips([
    {label:'Rarely or never',value:'rarely'},
    {label:'At tax time only',value:'tax-time'},
    {label:'Quarterly',value:'quarterly'},
    {label:'Monthly',value:'monthly'},
    {label:'Weekly',value:'weekly'},
  ]);
  addBubble({'rarely':'Rarely or never','tax-time':'At tax time only','quarterly':'Quarterly','monthly':'Monthly','weekly':'Weekly'}[A.q13], 'user');

  setProgress(18);
  await speak("Do you track key business numbers in a dashboard or regular report?", 700);
  A.q14 = await askChips([
    {label:'No tracking',value:'none'},
    {label:'I check occasionally',value:'occasional'},
    {label:'Basic spreadsheet',value:'spreadsheet'},
    {label:'Software dashboard',value:'dashboard'},
    {label:'Real-time automated reporting',value:'automated'},
  ]);
  addBubble({'none':'No tracking','occasional':'I check occasionally','spreadsheet':'Basic spreadsheet','dashboard':'Software dashboard','automated':'Real-time automated reporting'}[A.q14], 'user');

  setProgress(19);
  await speak("What is your primary goal for the next 12 months?", 700);
  A.q15 = await askChips([
    {label:'Survive and stabilize',value:'survive'},
    {label:'Increase revenue',value:'revenue'},
    {label:'Reduce owner dependency',value:'owner-dep'},
    {label:'Build a team',value:'team'},
    {label:'Automate and scale',value:'automate'},
    {label:'Exit or sell',value:'exit'},
  ]);
  addBubble({'survive':'Survive and stabilize','revenue':'Increase revenue','owner-dep':'Reduce owner dependency','team':'Build a team','automate':'Automate and scale','exit':'Exit or sell'}[A.q15], 'user');

  await speak("And thinking bigger — what's your goal for the next 5 years?", 700);
  A.q15b = await askChips([
    {label:'Keep growing steadily',value:'steady'},
    {label:'Build a larger company (team, locations)',value:'scale'},
    {label:'Remove myself — run without me day-to-day',value:'remove-self'},
    {label:'Sell the business',value:'exit'},
    {label:'Pass it to family',value:'legacy'},
    {label:'Not sure yet',value:'unsure'},
  ]);
  const q15bLabels = {'steady':'Keep growing steadily','scale':'Build a larger company','remove-self':'Remove myself from daily ops','exit':'Sell the business','legacy':'Pass to family','unsure':'Not sure yet'};
  addBubble(q15bLabels[A.q15b] || A.q15b, 'user');

  /* ── OWNER ECONOMICS ── */
  setProgress(20, 'Owner economics');
  await speak(`Last section, ${first}. These questions help us calculate something most business owners have never seen about their own business.`, 900);

  await speak("How much do you pay yourself per month? Enter the exact amount (enter 0 if you don't pay yourself).", 700);
  A.q16 = await askNumber('$/month', 0, 200000);
  addBubble('$' + Number(A.q16).toLocaleString() + '/month', 'user');

  setProgress(21);
  await speak("When do you typically work? Select all that apply.", 700);
  A.q18 = await askMultiChips([
    {label:'Early mornings (before 9am)', value:'mornings'},
    {label:'Evenings (after 5:30pm)', value:'evenings'},
    {label:'Weekends', value:'weekends'},
  ], 1);
  const slotDisplayNames = {mornings:'Early mornings (before 9am)', evenings:'Evenings (after 5:30pm)', weekends:'Weekends'};
  const slotNarrative = {mornings:'early mornings', evenings:'evenings', weekends:'weekends'};
  addBubble(A.q18.map(s => slotDisplayNames[s]||s).join(', '), 'user');

  // Per-slot hours
  const slotHrs = {};
  for (const slot of A.q18) {
    if (slot === 'mornings') {
      await speak("On average, how many hours per day do you work in early mornings (before 9am)?", 600);
      slotHrs[slot] = await askNumber('hrs/day', 0, 6);
      addBubble(slotHrs[slot] + ' hrs/day', 'user');
    } else if (slot === 'evenings') {
      await speak("On average, how many hours per day do you work in evenings (after 5:30pm)?", 600);
      slotHrs[slot] = await askNumber('hrs/day', 0, 6);
      addBubble(slotHrs[slot] + ' hrs/day', 'user');
    } else if (slot === 'weekends') {
      await speak("How many total hours do you work on weekends?", 600);
      slotHrs[slot] = await askNumber('hrs/week', 0, 30);
      addBubble(slotHrs[slot] + ' hrs/week', 'user');
    }
  }
  A.q17_slots = slotHrs;
  A.q17_regular = 40; // 8 hrs/day × 5 days, auto

  setProgress(22);
  // Auto-compute total: regular 40 + mornings/evenings × 5 days + weekends as-is
  const morningWeekly = (slotHrs.mornings || 0) * 5;
  const eveningWeekly = (slotHrs.evenings || 0) * 5;
  const weekendWeekly = slotHrs.weekends || 0;
  A.q17 = 40 + morningWeekly + eveningWeekly + weekendWeekly;
  await speak(`Got it — that works out to about ${A.q17} hours per week.`, 500);

  setProgress(23);
  A.q19_segments = {};
  A.q19 = 0;
  A.q19_total = 0;
  A.q19_headcount = 0;

  if (A.q5 !== 'solo') {
    await speak("What types of workers make up your team? Select all that apply.", 700);
    const teamTypes = await askMultiChips([
      {label:'Back office / admin',value:'admin'},
      {label:'Field technicians / service workers',value:'field'},
      {label:'Sales staff',value:'sales'},
      {label:'Contractors / 1099',value:'contractors'},
      {label:'Virtual assistants (VAs)',value:'va'},
      {label:'Managers',value:'managers'},
    ], 1);
    const teamTypeLabels = {admin:'Admin',field:'Field workers',sales:'Sales',contractors:'Contractors',va:'VAs',managers:'Managers'};
    addBubble(teamTypes.map(v => teamTypeLabels[v] || v).join(', '), 'user');

    const segLabels = {admin:'back office/admin',field:'field workers',sales:'sales staff',
      contractors:'contractors (1099)',va:'virtual assistants',managers:'managers'};
    let totalPay = 0;
    let totalWorkers = 0;

    for (const seg of teamTypes) {
      await speak(`How many ${segLabels[seg] || seg} do you have?`, 500);
      const count = await askNumber('people', 0, 500);
      addBubble(count + ' people', 'user');

      let pay = 0;
      if (Number(count) > 0) {
        await speak(`What does each ${segLabels[seg] || seg} earn on average per month?`, 500);
        pay = await askNumber('$/month each', 0, 30000);
        addBubble('$' + Number(pay).toLocaleString() + '/month each', 'user');
      }

      A.q19_segments[seg] = { count: Number(count), pay: Number(pay) };
      totalPay += Number(count) * Number(pay);
      totalWorkers += Number(count);
    }

    A.q19 = totalWorkers > 0 ? Math.round(totalPay / totalWorkers) : 0;
    A.q19_total = totalPay;
    A.q19_headcount = totalWorkers;
  } else {
    // Solo — no team
    A.q19_segments = {};
    A.q19_total = 0;
    A.q19_headcount = 0;
  }

  /* ── FINISH ── */
  await finishAssessment();
}

/* ── FINISH + AI CALL ────────────────────────────────── */
async function finishAssessment() {
  clearInput();
  setProgress(23, 'Building your report');
  await speak(`Perfect, ${A.contact.name.split(' ')[0]}. I have everything I need. Give me a moment to put your report together.`, 900);
  showTyping();
  await sleep(500);

  // Build AI prompt
  const industryLabels = {'home-services':'Home Services','construction':'Construction','food-bev':'Food & Beverage','retail':'Retail','health-wellness':'Health & Wellness','professional-services':'Professional Services','auto':'Auto Services','real-estate':'Real Estate'};
  const yearsLabels = {'lt1':'less than 1 year','1-2':'1–2 years','3-5':'3–5 years','6-10':'6–10 years','10plus':'over 10 years'};
  const sizeLabels = {'solo':'just yourself','2-5':'2–5 people','6-15':'6–15 people','16-30':'16–30 people','30plus':'30+ people'};

  const q7Display = A.q7 === 'none' ? 'No repeat customers' : A.q7 === 'dont-know' ? 'Has repeat customers but does not track the rate' : A.q7 + '%';
  const systemPrompt = `You are a direct, experienced business advisor writing for Nexvora Systems. Generate TWO short pieces of text for a business assessment report. Respond with ONLY valid JSON, no markdown.

Business profile:
- Owner: ${A.contact.name}
- Industry: ${industryLabels[A.q1] || A.q1}
- State: ${A.q2}
- Years operating: ${yearsLabels[A.q3] || A.q3}
- Annual revenue: ${A.q4}
- Team size: ${sizeLabels[A.q5] || A.q5}
- Repeat customers: ${q7Display}
- Goal: ${A.q15}

JSON format:
{
  "benchmark_narrative": "2-3 sentence motivational paragraph about what surviving this long in their industry means. Reference their specific industry, state, and years. Direct and real, not fluffy.",
  "executive_summary": "3-4 sentence summary of their business situation — what they are doing well, their biggest risk area, and what the single most important priority is right now. Use their actual data. No generic advice."
}`;

  let aiResult = { benchmark_narrative: '', executive_summary: '' };
  try {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 12000);
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: [{ role: 'user', content: systemPrompt }], max_tokens: 400 }),
      signal: controller.signal
    });
    clearTimeout(timer);
    const data = await res.json();
    const match = (data.reply || '').match(/\{[\s\S]*\}/);
    if (match) aiResult = JSON.parse(match[0]);
  } catch(e) { console.warn('AI summary skipped:', e.message); }

  hideTyping();

  // Store everything
  const payload = { contact: A.contact, q1:A.q1, q1b:A.q1b, q1b_label:A.q1b_label, q2:A.q2, q3:A.q3, q4:A.q4, q5:A.q5, q6:A.q6, q7:A.q7, q8:A.q8, q9:A.q9, q9_adspend:A.q9_adspend, q9_leads:A.q9_leads, q10:A.q10, q11:A.q11, q11b:A.q11b, q11c:A.q11c, q12:A.q12, q13:A.q13, q14:A.q14, q15:A.q15, q15b:A.q15b, q16:A.q16, q17:A.q17, q17_regular:A.q17_regular||0, q17_slots:A.q17_slots||{}, q18:A.q18, q19:A.q19, q19_segments:A.q19_segments, q19_total:A.q19_total, q19_headcount:A.q19_headcount, ai_benchmark: aiResult.benchmark_narrative, ai_summary: aiResult.executive_summary };
  localStorage.setItem('nexvora_assessment', JSON.stringify(payload));

  // Encode payload into URL so the report link works from any device (email link)
  // URL-safe base64: replace +/= so email clients don't break the link
  const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(payload))))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
  const reportUrl = `${window.location.origin}/report.html?d=${encoded}`;

  document.getElementById('progFill').style.width = '100%';
  document.getElementById('progLabel').textContent = 'Complete';
  addBubble(`Your report is ready, ${A.contact.name.split(' ')[0]}! Taking you there now...`, 'bot');

  // Save to Supabase first, get short ID, then call GHL with short URL
  let shortUrl = reportUrl; // fallback to base64 URL if save fails
  try {
    const saveRes = await fetch('/api/save-report', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    if (saveRes.ok) {
      const saveData = await saveRes.json();
      if (saveData.id) {
        shortUrl = `${window.location.origin}/r/${saveData.id}`;
      }
    }
  } catch(e) { console.warn('[save-report] failed, using base64 URL:', e.message); }

  // Push to GHL with the short URL (or base64 fallback)
  try {
    const ghlRes = await fetch('/api/ghl', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ...payload, reportUrl: shortUrl })
    });
    const ghlData = await ghlRes.json();
    console.log('[GHL]', ghlData);
  } catch(e) { console.warn('[GHL] failed:', e.message); }

  await sleep(1200);
  window.location.href = `report.html?d=${encoded}`;
}

main().catch(err => {
  console.error('Assessment flow error:', err);
  hideTyping();
  document.getElementById('inputArea').style.display = 'none';
  const inner = document.getElementById('chatInner');
  const row = document.createElement('div');
  row.className = 'brow bot';
  row.innerHTML = '<div class="avatar">NX</div><div class="bbl bot">Something went wrong. Please refresh the page and try again.</div>';
  inner.appendChild(row);
});
</script>
