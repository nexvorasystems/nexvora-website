<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Theme Preview — Pick 1–8</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif;background:#09090B;color:#fff;}

/* ── NUMBER BAR ── */
.num-bar{
  position:fixed;top:0;left:0;right:0;z-index:500;
  height:52px;display:flex;align-items:center;justify-content:center;gap:8px;
  background:rgba(9,9,11,0.96);backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(255,255,255,0.08);
  padding:0 20px;
}
.num-btn{
  width:38px;height:38px;border-radius:10px;border:1px solid rgba(255,255,255,0.12);
  background:transparent;color:rgba(255,255,255,0.45);
  font-size:15px;font-weight:700;cursor:pointer;transition:all 0.15s;
}
.num-btn:hover{border-color:rgba(255,255,255,0.4);color:#fff;}
.num-btn.active{background:#fff;color:#09090B;border-color:#fff;}
.bar-label{font-size:11px;color:rgba(255,255,255,0.25);letter-spacing:1px;margin-right:4px;}

/* ── PANELS ── */
.panel{display:none;padding-top:52px;min-height:100vh;}
.panel.active{display:block;}

/* ── SHARED LAYOUT (uses CSS vars per theme) ── */
.t-wrap{background:var(--bg);color:var(--text);}

/* Nav */
.t-nav{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 44px;height:66px;
  background:var(--nav-bg);border-bottom:1px solid var(--border);
  position:sticky;top:52px;z-index:10;
}
.t-logo{font-size:18px;font-weight:800;letter-spacing:-0.5px;color:var(--text);}
.t-logo span{color:var(--accent);}
.t-links{display:flex;gap:28px;list-style:none;}
.t-links a{font-size:14px;text-decoration:none;color:var(--text);opacity:0.5;transition:opacity 0.15s;}
.t-links a:hover{opacity:1;}
.t-cta{padding:9px 20px;border-radius:8px;font-size:13px;font-weight:700;border:none;cursor:pointer;background:var(--accent);color:var(--cta-text);}

/* Hero */
.t-hero{
  padding:88px 44px 80px;text-align:center;
  background:var(--hero-bg);
  position:relative;overflow:hidden;
}
.t-hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 65% 50% at 50% 0%, var(--glow), transparent);
  pointer-events:none;
}
.t-pill{
  display:inline-block;font-size:10px;font-weight:800;letter-spacing:2.5px;
  text-transform:uppercase;padding:5px 14px;border-radius:100px;
  background:var(--pill-bg);color:var(--accent);border:1px solid var(--pill-border);
  margin-bottom:20px;position:relative;
}
.t-hero h1{
  font-size:clamp(2.4rem,4.5vw,3.8rem);font-weight:800;
  line-height:1.08;letter-spacing:-1.5px;
  color:var(--text);margin-bottom:18px;position:relative;
}
.t-hero h1 span{color:var(--accent);}
.t-hero p{
  font-size:17px;line-height:1.65;color:var(--muted);
  max-width:500px;margin:0 auto 36px;position:relative;
}
.t-btns{display:flex;gap:12px;justify-content:center;position:relative;}
.t-btn-p{
  padding:14px 28px;border-radius:9px;font-size:15px;font-weight:700;
  background:var(--accent);color:var(--cta-text);border:none;cursor:pointer;
  transition:all 0.18s;text-decoration:none;display:inline-block;
}
.t-btn-p:hover{transform:translateY(-2px);filter:brightness(1.08);}
.t-btn-g{
  padding:14px 28px;border-radius:9px;font-size:15px;font-weight:600;
  background:transparent;color:var(--text);border:1px solid var(--border-strong);
  cursor:pointer;transition:all 0.18s;text-decoration:none;display:inline-block;
}
.t-btn-g:hover{transform:translateY(-1px);}

/* Stats */
.t-stats{
  display:grid;grid-template-columns:repeat(4,1fr);
  background:var(--surface);
  border-top:1px solid var(--border);border-bottom:1px solid var(--border);
}
.t-stat{padding:28px 24px;text-align:center;border-right:1px solid var(--border);}
.t-stat:last-child{border-right:none;}
.t-stat-n{font-size:2rem;font-weight:800;letter-spacing:-1px;color:var(--accent);margin-bottom:5px;}
.t-stat-l{font-size:11px;font-weight:600;color:var(--dim);}

/* Services */
.t-services{padding:72px 44px;}
.t-section-label{font-size:10px;font-weight:800;letter-spacing:2.5px;text-transform:uppercase;color:var(--accent);margin-bottom:10px;}
.t-section-h{font-size:clamp(1.5rem,2.5vw,2.2rem);font-weight:800;letter-spacing:-0.5px;color:var(--text);margin-bottom:36px;}
.t-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.t-card{
  padding:28px;border-radius:14px;
  background:var(--card-bg);border:1px solid var(--border);
  transition:transform 0.18s,border-color 0.18s;
}
.t-card:hover{transform:translateY(-3px);border-color:var(--border-strong);}
.t-card-icon{
  width:38px;height:38px;border-radius:9px;
  background:var(--pill-bg);display:flex;align-items:center;justify-content:center;
  margin-bottom:14px;
}
.t-card h3{font-size:1rem;font-weight:700;color:var(--text);margin-bottom:8px;}
.t-card p{font-size:13px;line-height:1.6;color:var(--muted);}

/* CTA */
.t-cta-section{padding:0 44px 72px;}
.t-cta-block{
  border-radius:18px;padding:60px 48px;text-align:center;
  background:var(--cta-block-bg);border:1px solid var(--border-strong);
  position:relative;overflow:hidden;
}
.t-cta-block::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 55% 45% at 50% 0%,var(--glow),transparent);
  border-radius:18px;pointer-events:none;
}
.t-cta-block h2{font-size:clamp(1.4rem,3vw,2rem);font-weight:800;letter-spacing:-0.5px;color:var(--text);margin-bottom:12px;position:relative;}
.t-cta-block p{font-size:16px;color:var(--muted);margin-bottom:28px;position:relative;}

@media(max-width:768px){
  .t-nav{padding:0 20px;}.t-links{display:none;}
  .t-hero{padding:64px 20px 56px;}
  .t-stats{grid-template-columns:repeat(2,1fr);}
  .t-cards{grid-template-columns:1fr;}
  .t-services,.t-cta-section{padding-left:20px;padding-right:20px;}
  .t-cta-block{padding:40px 24px;}
  .num-bar{gap:5px;}
  .num-btn{width:34px;height:34px;font-size:14px;}
}

/* ════════════════════════════════
   8 THEME VARIABLE SETS
════════════════════════════════ */

/* 1 · Pure Carbon */
#p1 .t-wrap{--bg:#09090B;--surface:#111113;--card-bg:#18181B;--nav-bg:rgba(9,9,11,0.9);--hero-bg:#09090B;--text:#FAFAFA;--muted:rgba(250,250,250,0.45);--dim:rgba(250,250,250,0.25);--border:rgba(255,255,255,0.07);--border-strong:rgba(255,255,255,0.16);--accent:#FAFAFA;--cta-text:#09090B;--glow:rgba(250,250,250,0.05);--pill-bg:rgba(250,250,250,0.07);--pill-border:rgba(250,250,250,0.14);--cta-block-bg:#111113;}

/* 2 · Apple Dark */
#p2 .t-wrap{--bg:#000000;--surface:#1C1C1E;--card-bg:#1C1C1E;--nav-bg:rgba(0,0,0,0.88);--hero-bg:#000000;--text:#F5F5F7;--muted:#98989D;--dim:#636366;--border:rgba(255,255,255,0.1);--border-strong:rgba(10,132,255,0.4);--accent:#0A84FF;--cta-text:#FFFFFF;--glow:rgba(10,132,255,0.14);--pill-bg:rgba(10,132,255,0.1);--pill-border:rgba(10,132,255,0.25);--cta-block-bg:#1C1C1E;}

/* 3 · Midnight Teal */
#p3 .t-wrap{--bg:#05080F;--surface:#080d1a;--card-bg:rgba(255,255,255,0.03);--nav-bg:rgba(5,8,15,0.9);--hero-bg:#05080F;--text:rgba(255,255,255,0.93);--muted:rgba(255,255,255,0.42);--dim:rgba(255,255,255,0.22);--border:rgba(255,255,255,0.07);--border-strong:rgba(68,202,162,0.3);--accent:#44CAA2;--cta-text:#05080F;--glow:rgba(68,202,162,0.14);--pill-bg:rgba(68,202,162,0.08);--pill-border:rgba(68,202,162,0.2);--cta-block-bg:#080d1a;}

/* 4 · Chalk White */
#p4 .t-wrap{--bg:#FFFFFF;--surface:#F4F4F5;--card-bg:#FFFFFF;--nav-bg:rgba(255,255,255,0.9);--hero-bg:#FFFFFF;--text:#09090B;--muted:#52525B;--dim:#A1A1AA;--border:#E4E4E7;--border-strong:rgba(37,99,235,0.35);--accent:#2563EB;--cta-text:#FFFFFF;--glow:rgba(37,99,235,0.08);--pill-bg:#EFF6FF;--pill-border:#BFDBFE;--cta-block-bg:#09090B;}

/* 5 · Cream Teal */
#p5 .t-wrap{--bg:#FAF8F5;--surface:#F0EDE8;--card-bg:rgba(255,255,255,0.75);--nav-bg:rgba(250,248,245,0.9);--hero-bg:#FAF8F5;--text:#1A1A2E;--muted:#4A5568;--dim:#718096;--border:#E2DDD5;--border-strong:rgba(13,148,136,0.35);--accent:#0D9488;--cta-text:#FFFFFF;--glow:rgba(13,148,136,0.1);--pill-bg:rgba(13,148,136,0.08);--pill-border:rgba(13,148,136,0.2);--cta-block-bg:#0F2B4C;}

/* 6 · Ice + Teal */
#p6 .t-wrap{--bg:#F0FDFB;--surface:#CCFBF1;--card-bg:#FFFFFF;--nav-bg:rgba(240,253,251,0.92);--hero-bg:#F0FDFB;--text:#0F2B2A;--muted:#2D6A68;--dim:#5EABA8;--border:rgba(13,148,136,0.18);--border-strong:rgba(13,148,136,0.45);--accent:#0D9488;--cta-text:#FFFFFF;--glow:rgba(13,148,136,0.12);--pill-bg:rgba(13,148,136,0.08);--pill-border:rgba(13,148,136,0.2);--cta-block-bg:#0F2B2A;}

/* 7 · Pure + Black */
#p7 .t-wrap{--bg:#FFFFFF;--surface:#F4F4F5;--card-bg:#FFFFFF;--nav-bg:rgba(255,255,255,0.92);--hero-bg:#FFFFFF;--text:#09090B;--muted:#52525B;--dim:#A1A1AA;--border:#E4E4E7;--border-strong:#09090B;--accent:#09090B;--cta-text:#FFFFFF;--glow:rgba(0,0,0,0.04);--pill-bg:#F4F4F5;--pill-border:#D4D4D8;--cta-block-bg:#09090B;}

/* 8 · Cream Navy */
#p8 .t-wrap{--bg:#FAF8F5;--surface:#F0EDE8;--card-bg:rgba(255,255,255,0.8);--nav-bg:rgba(250,248,245,0.9);--hero-bg:#FAF8F5;--text:#1A1A2E;--muted:#4A5568;--dim:#718096;--border:#E2DDD5;--border-strong:rgba(30,58,95,0.35);--accent:#1E3A5F;--cta-text:#FFFFFF;--glow:rgba(30,58,95,0.08);--pill-bg:rgba(30,58,95,0.06);--pill-border:rgba(30,58,95,0.18);--cta-block-bg:#1E3A5F;}
</style>
</head>
<body>

<!-- NUMBER BAR -->
<div class="num-bar">
  <span class="bar-label">THEME</span>
  <button class="num-btn active" onclick="go(1)">1</button>
  <button class="num-btn" onclick="go(2)">2</button>
  <button class="num-btn" onclick="go(3)">3</button>
  <button class="num-btn" onclick="go(4)">4</button>
  <button class="num-btn" onclick="go(5)">5</button>
  <button class="num-btn" onclick="go(6)">6</button>
  <button class="num-btn" onclick="go(7)">7</button>
  <button class="num-btn" onclick="go(8)">8</button>
</div>

<!-- SVG ICONS (shared) -->
<svg style="display:none">
  <symbol id="ico-dollar" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></symbol>
  <symbol id="ico-users" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></symbol>
  <symbol id="ico-monitor" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></symbol>
</svg>

<!-- THEME LABELS -->
<script>
const LABELS = ['','Pure Carbon','Apple Dark','Midnight Teal','Chalk White','Cream Teal','Ice + Teal','Pure + Black','Cream Navy'];
</script>

<!-- PANELS 1–8 -->
<script>
function makePanel(n) {
  const label = ['','Pure Carbon — #09090B + White','Apple Dark — #000000 + #0A84FF Blue','Midnight Teal — #05080F + #44CAA2','Chalk White — #FFFFFF + #2563EB Cobalt','Cream Teal — #FAF8F5 + #0D9488','Ice + Teal — #F0FDFB + #0D9488','Pure + Black — #FFFFFF + #09090B','Cream Navy — #FAF8F5 + #1E3A5F'][n];
  const heroSpan = ['','Operational<br>Intelligence','Find Revenue<br>Gaps','Operational<br>Intelligence','Revenue Gaps<br>Found','Operational<br>Intelligence','Revenue Gaps<br>Found','Operational<br>Intelligence','Revenue Gaps<br>Found'][n];

  return `
  <div class="panel${n===1?' active':''}" id="p${n}">
  <div class="t-wrap">

    <!-- badge -->
    <div style="background:var(--accent);color:var(--cta-text);text-align:center;padding:8px;font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;opacity:0.9;">
      ${n} · ${LABELS[n]}
    </div>

    <!-- Nav -->
    <nav class="t-nav">
      <div class="t-logo">Nexvora<span>.</span></div>
      <ul class="t-links">
        <li><a href="#">About</a></li>
        <li><a href="#">Services</a></li>
        <li><a href="#">Insights</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
      <button class="t-cta">Free Assessment</button>
    </nav>

    <!-- Hero -->
    <div class="t-hero">
      <div class="t-pill">Operational Intelligence</div>
      <h1>Find the Revenue Gaps<br><span>Inside Your Business</span></h1>
      <p>We analyze your operations and identify exactly where you're losing money — then give you a clear path to fix it. The average client finds $2.4M.</p>
      <div class="t-btns">
        <a href="#" class="t-btn-p">Find My Revenue Gaps →</a>
        <a href="#" class="t-btn-g">View Services</a>
      </div>
    </div>

    <!-- Stats -->
    <div class="t-stats">
      <div class="t-stat"><div class="t-stat-n">$2.4M</div><div class="t-stat-l">Avg. recoverable revenue</div></div>
      <div class="t-stat"><div class="t-stat-n">500+</div><div class="t-stat-l">Businesses assessed</div></div>
      <div class="t-stat"><div class="t-stat-n">14</div><div class="t-stat-l">Operational dimensions</div></div>
      <div class="t-stat"><div class="t-stat-n">10 min</div><div class="t-stat-l">Free assessment</div></div>
    </div>

    <!-- Services -->
    <div class="t-services">
      <div class="t-section-label">What We Fix</div>
      <div class="t-section-h">Where Businesses Leak Money</div>
      <div class="t-cards">
        <div class="t-card">
          <div class="t-card-icon"><svg width="18" height="18" style="color:var(--accent)"><use href="#ico-dollar"/></svg></div>
          <h3>Revenue Leakage</h3>
          <p>Mispriced deals, lost follow-ups, and billing errors draining your top line silently.</p>
        </div>
        <div class="t-card">
          <div class="t-card-icon"><svg width="18" height="18" style="color:var(--accent)"><use href="#ico-users"/></svg></div>
          <h3>Team Friction</h3>
          <p>Unclear ownership, duplicate work, and misaligned incentives costing you capacity.</p>
        </div>
        <div class="t-card">
          <div class="t-card-icon"><svg width="18" height="18" style="color:var(--accent)"><use href="#ico-monitor"/></svg></div>
          <h3>Tech Waste</h3>
          <p>Overlapping tools and manual processes you're paying for that produce no results.</p>
        </div>
      </div>
    </div>

    <!-- CTA -->
    <div class="t-cta-section">
      <div class="t-cta-block">
        <div class="t-pill" style="position:relative;">Ready?</div>
        <h2>Find Your Revenue Gaps in 10 Minutes</h2>
        <p>Free. No credit card. Results the same day.</p>
        <a href="#" class="t-btn-p" style="position:relative;">Find My Revenue Gaps →</a>
      </div>
    </div>

  </div>
  </div>`;
}

document.body.insertAdjacentHTML('beforeend',
  [1,2,3,4,5,6,7,8].map(makePanel).join('')
);
</script>

<script>
function go(n){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.num-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('p'+n).classList.add('active');
  document.querySelectorAll('.num-btn')[n-1].classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}
</script>
</body>
</html>
