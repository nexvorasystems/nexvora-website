<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Falcon — Real 3D Flight</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{overflow:hidden;background:#FAF8F5;}
canvas{display:block;position:fixed;inset:0;}

.ui{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  z-index:100;
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:center;
}
.ui-pill{
  display:flex;align-items:center;gap:8px;
  background:rgba(250,248,245,0.9);backdrop-filter:blur(12px);
  border:1px solid #E2DDD5;border-radius:100px;
  padding:8px 16px;font-size:12px;font-weight:700;color:#1A1A2E;
  cursor:pointer;transition:all 0.2s;user-select:none;
}
.ui-pill:hover{border-color:#0D9488;color:#0D9488;}
.ui-pill.on{background:#0D9488;color:#fff;border-color:#0D9488;}

.speed-wrap{
  display:flex;align-items:center;gap:8px;
  background:rgba(250,248,245,0.9);backdrop-filter:blur(12px);
  border:1px solid #E2DDD5;border-radius:100px;
  padding:8px 16px;
}
.speed-wrap label{font-size:11px;font-weight:700;color:#718096;}
input[type=range]{width:80px;accent-color:#0D9488;}

.maneuver{
  position:fixed;top:20px;left:50%;transform:translateX(-50%);
  z-index:100;
  font-size:13px;font-weight:800;letter-spacing:2px;text-transform:uppercase;
  color:#0D9488;opacity:0.7;
  background:rgba(250,248,245,0.8);backdrop-filter:blur(8px);
  border:1px solid rgba(13,148,136,0.2);border-radius:100px;
  padding:6px 18px;
  transition:opacity 0.3s;
}

.dark-mode .ui-pill:not(.on){background:rgba(5,8,15,0.9);color:rgba(255,255,255,0.7);border-color:rgba(255,255,255,0.1);}
.dark-mode .ui-pill:not(.on):hover{border-color:#44CAA2;color:#44CAA2;}
.dark-mode .speed-wrap{background:rgba(5,8,15,0.9);border-color:rgba(255,255,255,0.1);color:rgba(255,255,255,0.5);}
.dark-mode .speed-wrap label{color:rgba(255,255,255,0.4);}
.dark-mode .maneuver{background:rgba(5,8,15,0.85);border-color:rgba(68,202,162,0.2);color:#44CAA2;}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div class="maneuver" id="maneuverLabel">Soaring</div>

<div class="ui">
  <div class="ui-pill" id="btnBg" onclick="toggleBg()">Light BG</div>
  <div class="ui-pill" id="btnTrail" onclick="toggleTrail()">Trail Off</div>
  <div class="ui-pill" id="btnSize" onclick="toggleSize()">Normal Size</div>
  <div class="speed-wrap">
    <label>SPEED</label>
    <input type="range" id="speedSlider" min="20" max="200" value="80"
      oninput="speed = this.value/100"/>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════
//  NEXVORA CRYSTAL FALCON — 3D FLIGHT RENDERER
//  Vanilla Canvas · No dependencies
// ═══════════════════════════════════════════════════

const C = document.getElementById('c');
const ctx = C.getContext('2d');
let W, H;
const resize = () => { W = C.width = innerWidth; H = C.height = innerHeight; };
resize(); addEventListener('resize', resize);

// ── SETTINGS ─────────────────────────────────────
let isDark  = false;
let trail   = false;
let bigMode = false;
let speed   = 0.8;

// ── 3D MATH ──────────────────────────────────────
const add  = (a,b) => [a[0]+b[0], a[1]+b[1], a[2]+b[2]];
const sub  = (a,b) => [a[0]-b[0], a[1]-b[1], a[2]-b[2]];
const mul  = (v,s) => [v[0]*s,    v[1]*s,    v[2]*s];
const dot  = (a,b) => a[0]*b[0]+a[1]*b[1]+a[2]*b[2];
const crs  = (a,b) => [a[1]*b[2]-a[2]*b[1], a[2]*b[0]-a[0]*b[2], a[0]*b[1]-a[1]*b[0]];
const len  = v  => Math.sqrt(v[0]*v[0]+v[1]*v[1]+v[2]*v[2]);
const nrm  = v  => { const l=len(v); return l>.0001?mul(v,1/l):[0,1,0]; };
const lerp = (a,b,t) => add(a, mul(sub(b,a),t));

// Apply row-major 3x3 matrix to vec3
function mxv(m, v) {
  return [
    m[0]*v[0]+m[1]*v[1]+m[2]*v[2],
    m[3]*v[0]+m[4]*v[1]+m[5]*v[2],
    m[6]*v[0]+m[7]*v[1]+m[8]*v[2]
  ];
}

// Perspective projection — camera at z=-CAM
function pj(p) {
  const FOV = 420, CAM = 62;
  const z = p[2] + CAM;
  if (z < 0.8) return null;
  return [W/2 + p[0]*FOV/z, H/2 + p[1]*FOV/z, z];
}

// ── WING FLAP ────────────────────────────────────
// Realistic asymmetric bird wing beat:
//   downstroke = quick + powerful  (positive sine phase)
//   upstroke   = slow  + recovery  (negative sine phase)
function flapY(base, section, phase) {
  const AMPS = [0.25, 1.8, 3.6, 5.8, 4.8];
  const LAGS = [0, 0.28, 0.55, 0.82, 0.7];
  const FEATHER_SPREAD = [1, 0.9, 0.8, 0.6, 0.75]; // wing tip opens more
  const p = phase - LAGS[section];
  const raw = Math.sin(p);
  // Asymmetric: downstroke slightly faster
  const power = raw > 0 ? raw * 1.2 : raw * 0.8;
  return base + power * AMPS[section] * FEATHER_SPREAD[section];
}

// ── FALCON VERTEX MODEL ──────────────────────────
// Local space: X=right Y=down Z=toward-camera (before world transform)
// Origin = body center (chest area)
// Scale: 15 units ≈ half-wingspan
function getVerts(fp /* flapPhase */) {
  return [
    // ── BODY ── (indices 0-9)
    [0,  -8.0,  2.0],   // 0  beak-tip
    [0,  -6.5,  0.5],   // 1  forehead
    [0,  -5.0, -0.2],   // 2  crown
    [0,  -3.0, -0.4],   // 3  nape
    [0,  -0.5, -0.3],   // 4  upper-back
    [0,   2.5,  0.0],   // 5  mid-body
    [0,   6.0,  0.2],   // 6  lower-body
    [0,   9.0,  0.2],   // 7  rump
    [-1.8, 13.5, -0.8], // 8  tail-left
    [ 1.8, 13.5, -0.8], // 9  tail-right

    // ── LEFT WING ── (indices 10-17)
    // 10=shoulder-front  11=elbow  12=wrist  13=tip-front
    // 14=tip-back  15=trailing-outer  16=trailing-mid  17=wing-root-back
    [-2.8, flapY(-1.2, 0, fp), 0.0],           // 10 L-shoulder-front
    [-7.2, flapY( 0.5, 1, fp), 0.7],           // 11 L-elbow
    [-12.8,flapY( 2.2, 2, fp), 1.4],           // 12 L-wrist
    [-16.5,flapY( 3.5, 3, fp), 1.9],           // 13 L-tip-front
    [-14.5,flapY( 7.5, 4, fp), 0.9],           // 14 L-tip-back
    [-10.0,flapY( 6.0, 2, fp)*0.55+1.2, 0.65],// 15 L-trailing-outer
    [- 5.5,flapY( 4.5, 1, fp)*0.35+0.6, 0.35],// 16 L-trailing-mid
    [- 2.2,flapY( 3.0, 0, fp)*0.15+0.5, 0.1], // 17 L-wing-root-back

    // ── RIGHT WING ── (indices 18-25, mirror of left)
    [ 2.8, flapY(-1.2, 0, fp), 0.0],           // 18 R-shoulder-front
    [ 7.2, flapY( 0.5, 1, fp), 0.7],           // 19 R-elbow
    [12.8, flapY( 2.2, 2, fp), 1.4],           // 20 R-wrist
    [16.5, flapY( 3.5, 3, fp), 1.9],           // 21 R-tip-front
    [14.5, flapY( 7.5, 4, fp), 0.9],           // 22 R-tip-back
    [10.0, flapY( 6.0, 2, fp)*0.55+1.2, 0.65],// 23 R-trailing-outer
    [ 5.5, flapY( 4.5, 1, fp)*0.35+0.6, 0.35],// 24 R-trailing-mid
    [ 2.2, flapY( 3.0, 0, fp)*0.15+0.5, 0.1], // 25 R-wing-root-back
  ];
}

// ── FACE DEFINITIONS ─────────────────────────────
// [v0, v1, v2, colorGroup]
// Groups: 0=body  1=wing-upper  2=wing-lower  3=tail  4=beak
const FACES = [
  // Beak
  [0, 1, 2, 4],
  [0, 2, 3, 4],

  // Head/Neck → Shoulders
  [1, 2, 3, 0],
  [3, 4, 10, 0],    // left side neck to L-shoulder
  [3, 4, 18, 0],    // right side neck to R-shoulder
  [4, 5, 10, 0],    // upper-back to L-shoulder
  [4, 5, 18, 0],    // upper-back to R-shoulder

  // Body sides
  [5, 6, 17, 0],    // mid-body left side
  [5, 6, 25, 0],    // mid-body right side
  [6, 7, 17, 0],    // lower-body left
  [6, 7, 25, 0],    // lower-body right
  [5, 6, 7, 0],     // belly strip

  // Tail
  [7, 8,  9, 3],    // tail spread
  [6, 7,  8, 3],
  [6, 7,  9, 3],

  // Left wing — 6 triangular facets front-to-back
  [10, 11, 17, 1],
  [11, 17, 16, 1],
  [11, 12, 16, 1],
  [12, 16, 15, 1],
  [12, 13, 15, 1],
  [13, 15, 14, 1],

  // Left wing lower edge (thin secondary surface)
  [10, 11, 12, 2],
  [10, 12, 13, 2],

  // Right wing — mirror
  [18, 19, 25, 1],
  [19, 25, 24, 1],
  [19, 20, 24, 1],
  [20, 24, 23, 1],
  [20, 21, 23, 1],
  [21, 23, 22, 1],

  // Right wing lower edge
  [18, 19, 20, 2],
  [18, 20, 21, 2],

  // Wing roots connecting to body
  [5, 10, 17, 1],
  [5, 18, 25, 1],
];

// ── FLIGHT PATH ──────────────────────────────────
// Complex 3D figure-8 with altitude changes
function flightPath(t) {
  const s = Math.min(W, H) * 0.26;
  return [
    s * 1.0 * Math.sin(t),
    s * 0.22 * Math.sin(2.3*t + 0.4) + s * 0.1 * Math.sin(t*0.7),
    s * 0.30 * Math.sin(2*t + 1.2) * 0.6,
  ];
}

// ── SMOOTH LERP BANK ─────────────────────────────
let smoothBank = 0, smoothPitch = 0;

// ── TRAIL BUFFER ─────────────────────────────────
const TRAIL_BUF = [];
const TRAIL_LEN = 22;

// ── MANEUVER DETECTOR ────────────────────────────
const MANEUVERS = ['Soaring','Banking Left','Banking Right','Climbing','Diving','Attack Dive','Level Flight'];
function getManeuver(bank, pitch) {
  const B = bank * 180/Math.PI;
  const P = pitch * 180/Math.PI;
  if (P < -22) return 'Attack Dive';
  if (P < -10) return 'Diving';
  if (P >  14) return 'Climbing';
  if (B <  -18) return 'Banking Left';
  if (B >   18) return 'Banking Right';
  if (Math.abs(B) < 5 && Math.abs(P) < 5) return 'Level Flight';
  return 'Soaring';
}

// ── SHADING ──────────────────────────────────────
const LIGHT = nrm([0.4, -0.65, 0.65]);
function faceShade(w0, w1, w2) {
  const n = nrm(crs(sub(w1,w0), sub(w2,w0)));
  return Math.max(0.12, Math.min(1, dot(n, LIGHT) * 0.75 + 0.45));
}
function faceColor(group, shade, dark) {
  if (group === 4) return dark ? '#44CAA2' : '#0D9488'; // beak solid
  const tbl = dark ? [
    [68,202,162,[0.1,0.28]],  // 0 body
    [68,202,162,[0.18,0.42]], // 1 wing upper
    [68,202,162,[0.08,0.22]], // 2 wing lower
    [68,202,162,[0.14,0.35]], // 3 tail
  ] : [
    [13,148,136,[0.07,0.20]], // 0 body
    [13,148,136,[0.14,0.38]], // 1 wing upper
    [13,148,136,[0.07,0.18]], // 2 wing lower
    [13,148,136,[0.11,0.28]], // 3 tail
  ];
  const [r,g,b,[lo,hi]] = tbl[group];
  const a = lo + (hi-lo)*shade;
  return `rgba(${r},${g},${b},${a.toFixed(3)})`;
}
function strokeColor(shade, dark) {
  return dark
    ? `rgba(68,202,162,${(shade*0.55).toFixed(3)})`
    : `rgba(13,148,136,${(shade*0.45).toFixed(3)})`;
}

// ── MAIN ANIMATION LOOP ──────────────────────────
let t = 0;
let prevManeuver = '';

function frame() {
  requestAnimationFrame(frame);

  t += 0.011 * speed;

  const sc = (bigMode ? 1.55 : 1.0) * Math.min(W,H) / 55;

  // ── Background ──
  if (trail) {
    ctx.fillStyle = isDark ? 'rgba(5,8,15,0.18)' : 'rgba(250,248,245,0.18)';
    ctx.fillRect(0,0,W,H);
  } else {
    ctx.fillStyle = isDark ? '#05080F' : '#FAF8F5';
    ctx.fillRect(0,0,W,H);
  }

  // Subtle ambient glow
  const gr = ctx.createRadialGradient(W/2,H/2,0, W/2,H/2, Math.min(W,H)*0.55);
  gr.addColorStop(0, isDark ? 'rgba(68,202,162,0.04)' : 'rgba(13,148,136,0.05)');
  gr.addColorStop(1, 'transparent');
  ctx.fillStyle = gr;
  ctx.fillRect(0,0,W,H);

  // ── Flight position & orientation ──
  const pos   = flightPath(t);
  const posF  = flightPath(t + 0.045);
  const posB  = flightPath(t - 0.045);

  const tangent = nrm(sub(posF, pos));
  const lateral = (posF[0] - posB[0]) * 0.9;   // for banking
  const vertical = tangent[1];                   // for pitch

  // Smooth bank & pitch
  const targetBank  = -lateral * 0.55;
  const targetPitch = -vertical * 0.5;
  smoothBank  += (targetBank  - smoothBank)  * 0.08;
  smoothPitch += (targetPitch - smoothPitch) * 0.08;

  // Build orientation matrix
  // Forward = tangent
  const fwd = tangent;
  const worldUp = [0, -1, 0];
  const right0 = nrm(crs(fwd, worldUp));
  const up0    = nrm(crs(right0, fwd));
  const cosB = Math.cos(smoothBank), sinB = Math.sin(smoothBank);
  const right = add(mul(right0, cosB), mul(up0, -sinB));
  const up    = add(mul(right0, sinB), mul(up0,  cosB));
  // Row-major rotation matrix [right; up; fwd]
  const M = [
    right[0], right[1], right[2],
    up[0],    up[1],    up[2],
    fwd[0],   fwd[1],   fwd[2],
  ];

  // Wing flap: faster in dives, slower in soar
  const flapSpeed = 3.2 + Math.abs(vertical) * 4;
  const fp = t * flapSpeed;

  // ── Build vertices ──
  const local = getVerts(fp);
  const world = local.map(v => {
    const s  = mul(v, sc / 16);    // scale to screen units
    const r  = mxv(M, s);           // rotate by orientation
    return add(r, pos);             // translate to flight pos
  });
  const screen = world.map(pj);

  // ── Trail ──
  if (trail) {
    const cp = pj(pos);
    if (cp) {
      TRAIL_BUF.push([...cp]);
      if (TRAIL_BUF.length > TRAIL_LEN) TRAIL_BUF.shift();
      TRAIL_BUF.forEach((tp, i) => {
        const a = (i / TRAIL_LEN) * 0.25;
        ctx.beginPath();
        ctx.arc(tp[0], tp[1], Math.max(0.5, 3.5 - i*0.12), 0, Math.PI*2);
        ctx.fillStyle = isDark ? `rgba(68,202,162,${a})` : `rgba(13,148,136,${a})`;
        ctx.fill();
      });
    }
  }

  // ── Z-sort faces (painter's algorithm) ──
  const facesReady = FACES.map(([i0,i1,i2,cg]) => {
    const s0=screen[i0], s1=screen[i1], s2=screen[i2];
    if (!s0||!s1||!s2) return null;
    const avgZ = (s0[2]+s1[2]+s2[2])/3;
    const shade = faceShade(world[i0], world[i1], world[i2]);
    return { s0,s1,s2, avgZ, cg, shade };
  }).filter(Boolean);

  facesReady.sort((a,b) => b.avgZ - a.avgZ);

  // ── Draw faces ──
  facesReady.forEach(({s0,s1,s2,cg,shade}) => {
    ctx.beginPath();
    ctx.moveTo(s0[0],s0[1]);
    ctx.lineTo(s1[0],s1[1]);
    ctx.lineTo(s2[0],s2[1]);
    ctx.closePath();
    ctx.fillStyle   = faceColor(cg, shade, isDark);
    ctx.fill();
    ctx.strokeStyle = strokeColor(shade, isDark);
    ctx.lineWidth   = 0.85;
    ctx.stroke();
  });

  // ── Maneuver label ──
  const maneuver = getManeuver(smoothBank, smoothPitch);
  if (maneuver !== prevManeuver) {
    document.getElementById('maneuverLabel').textContent = maneuver;
    prevManeuver = maneuver;
  }
}

// ── UI HANDLERS ──────────────────────────────────
function toggleBg() {
  isDark = !isDark;
  const btn = document.getElementById('btnBg');
  btn.textContent = isDark ? 'Dark BG' : 'Light BG';
  document.body.classList.toggle('dark-mode', isDark);
  const man = document.getElementById('maneuverLabel');
  man.style.color = isDark ? '#44CAA2' : '#0D9488';
  if (isDark) {
    document.body.style.background = '#05080F';
    man.style.borderColor = 'rgba(68,202,162,0.2)';
  } else {
    document.body.style.background = '#FAF8F5';
    man.style.borderColor = 'rgba(13,148,136,0.2)';
  }
}

function toggleTrail() {
  trail = !trail;
  const btn = document.getElementById('btnTrail');
  btn.textContent = trail ? 'Trail On' : 'Trail Off';
  btn.classList.toggle('on', trail);
  if (!trail) TRAIL_BUF.length = 0;
}

function toggleSize() {
  bigMode = !bigMode;
  const btn = document.getElementById('btnSize');
  btn.textContent = bigMode ? 'Big Size' : 'Normal Size';
  btn.classList.toggle('on', bigMode);
}

// ── START ──────────────────────────────────────
requestAnimationFrame(frame);
</script>
</body>
</html>
